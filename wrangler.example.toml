# Expert Brain — template de configuração Cloudflare.
#
# Copie este arquivo pra `wrangler.toml` e substitua os placeholders REPLACE_ME_*
# pelos IDs reais da sua conta. Ou rode `npm run setup` que o script faz isso
# automaticamente.
#
# - account_id: encontra em https://dash.cloudflare.com (canto inferior direito da sidebar)
# - database_id: gerado por `wrangler d1 create expert-brain`
# - id (OAUTH_KV): gerado por `wrangler kv namespace create OAUTH_KV`
# - id (GRAPH_CACHE): gerado por `wrangler kv namespace create GRAPH_CACHE`

name = "expert-brain"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]
account_id = "REPLACE_ME_ACCOUNT_ID"

# Crons — o scheduled() decide pelo controller.cron (src/scheduled.ts):
# - "0 11 * * *" (diário, 08:00 BRT): digest das tasks vencendo hoje + atrasadas pro
#   Telegram. Dormente até setar os secrets TELEGRAM_BOT_TOKEN e TELEGRAM_CHAT_ID
#   (`wrangler secret put ...`).
# - "0 5 * * 1" (segunda, 02:00 BRT): snapshot semanal de backup D1→R2 no bucket
#   MEDIA, prefixo backups/<YYYY-MM-DD>/ (mantém os últimos 8). Ver docs/restore.md.
# - "0 8 * * *" (05:00 BRT): re-pass diário das similar_edges das notas tocadas
#   nas últimas 48h (spec 70-grafo-higiene/72) — corrige vizinhança computada
#   contra índice defasado em import em lote.
[triggers]
crons = ["0 11 * * *", "0 5 * * 1", "0 8 * * *"]

# Workers Logs (spec 40-ops/43): persiste logs de request/cron no dashboard
# (Workers & Pages > seu worker > Logs) — sem isso, qualquer diagnóstico
# pós-incidente começa sem histórico nenhum (console.log só existe no
# `wrangler tail` ao vivo). head_sampling_rate = 1 grava 100% das invocações;
# o volume de um vault pessoal cabe com folga no free tier de Workers Logs.
[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "expert-brain"
database_id = "REPLACE_ME_D1_ID"

[[vectorize]]
binding = "VECTORIZE"
index_name = "expert-brain-embeddings"

# Bucket R2 pra mídia das notas (imagens/vídeos/docs/áudio). Crie com
# `wrangler r2 bucket create expert-brain-media`. Dedup por SHA-256 (key
# sha256/<hash>.<ext>); servido por rota autenticada com signed token (não público).
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "expert-brain-media"

# (Opcional) Vault de contatos — segundo Worker (github.com/Expert-Integrado/expert-contacts).
# Depois de deploya-lo na MESMA conta, descomente pra ligar as mencoes @contato, a aba
# Contatos do console e os paineis de integracao. W2W via service binding (sem token no
# browser; fetch global entre Workers da mesma conta da erro 1042). Complete com os
# secrets CONTACTS_PROXY_TOKEN / CONTACTS_WRITE_TOKEN (mesmo valor nos dois Workers).
# [[services]]
# binding = "CONTACTS"
# service = "expert-contacts"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "ExpertBrainMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ExpertBrainMCP"]

[assets]
directory = "./assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_ME_OAUTH_KV_ID"

[[kv_namespaces]]
binding = "GRAPH_CACHE"
id = "REPLACE_ME_GRAPH_CACHE_ID"

# Rate limiting de borda (spec 10-backend/18, recomendacao): o login ja tem
# rate limit em KV dentro do Worker (POST /authorize e /app/login), mas quem
# usa dominio proprio numa zona Cloudflare pode somar uma WAF rate limiting
# rule na borda (ex.: >20 POSTs/min por IP em /authorize ou /app/login ->
# block 10min). Corta o flood ANTES de invocar o Worker (economiza requests
# pagos). Em *.workers.dev nao ha zona propria - a defesa em KV basta.
