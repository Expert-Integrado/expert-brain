name: CI

# Gate obrigatorio de push/PR pra main: typecheck + testes + build reprodutivel.
# G0 do roadmap de specs (specs/40-ops/41-ci-typecheck-e-testes-criticos-brain.md) —
# nenhuma outra spec de codigo deveria rodar antes deste workflow ficar verde.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck server
        run: npx tsc --noEmit

      - name: Typecheck client
        run: npx tsc --noEmit -p src/web/client/tsconfig.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest (workers pool)
        run: npx vitest run

      - name: Run vitest (auth, node env)
        run: npx vitest run --config vitest.auth.config.ts

  build:
    name: Build bundles (in sync)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build:bundles

      - name: Fail if bundles are out of sync with source
        run: |
          if ! git diff --exit-code -- assets/ src/web/asset-version.ts; then
            echo "::error::assets/ e src/web/asset-version.ts nao estao em sync com o fonte. Rode 'npm run build:bundles' localmente e commite o resultado." >&2
            exit 1
          fi
