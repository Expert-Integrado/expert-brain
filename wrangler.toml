name = "expert-brain"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]
account_id = "d9aad183ce3765208b996bb904910466"

# ──────────────────────────────────────────────────────────────────────────────
# Expert Brain — configuração Cloudflare
# Fork de orobsonn/segundo-cerebro — crédito ao autor original
# ──────────────────────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "expert-brain"
database_id = "cbf896e9-3188-4e17-9532-9cff87bbd87e"
migrations_dir = "src/db/migrations"

[[vectorize]]
binding = "VECTORIZE"
index_name = "expert-brain-embeddings"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "ExpertBrainMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ExpertBrainMCP"]

[assets]
directory = "./assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "6cf333ea4d61428d8049d2f2f62f12bc"

[[kv_namespaces]]
binding = "GRAPH_CACHE"
id = "71670793dfa147d5b327d78cc37454ca"
